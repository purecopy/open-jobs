pre-commit:
  jobs:
    - name: format
      run: npx ultracite fix
      glob:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.json"
        - "**/*.jsonc"
        - "**/*.css"
      stage_fixed: true
    - name: typecheck
      run: npx tsc --noEmit
      glob:
        - "**/*.ts"
